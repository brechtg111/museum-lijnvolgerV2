# Mosquitto configuratie met WebSocket-ondersteuning
# Kopieer deze regels naar /etc/mosquitto/mosquitto.conf op de Raspberry Pi
# en herstart mosquitto: sudo systemctl restart mosquitto

# Standaard MQTT (voor de ESP32)
listener 1883
allow_anonymous false
password_file /etc/mosquitto/passwd

# WebSocket (voor het dashboard in de browser)
listener 9001
protocol websockets
allow_anonymous false
password_file /etc/mosquitto/passwd
